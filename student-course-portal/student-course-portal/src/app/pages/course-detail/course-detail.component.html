<h2>Course Detail</h2>
<p *ngIf="errorMessage" class="error">{{ errorMessage }}</p>
<div *ngIf="course">
  <p><strong>Name:</strong> {{ course.name }}</p>
  <p><strong>Code:</strong> {{ course.code }}</p>
  <p><strong>Credits:</strong> {{ course.credits }}</p>
  <p><strong>Status:</strong> {{ course.gradeStatus }}</p>
</div>
