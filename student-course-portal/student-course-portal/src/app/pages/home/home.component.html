<h1>{{ portalName }}</h1>
<p>Welcome back! Track your courses, grades, and enrollment status all in one place.</p>

<div class="stats">
  <div><strong>Courses Available:</strong> {{ coursesCount || 12 }}</div>
  <div><strong>Enrolled:</strong> 3</div>
  <div><strong>GPA:</strong> 3.8</div>
</div>

<button [disabled]="!isPortalActive" (click)="onEnrollClick()">Enroll Now</button>
<p *ngIf="message">{{ message }}</p>

<input [(ngModel)]="searchTerm" placeholder="Search courses...">
<p>Searching for: {{ searchTerm }}</p>
<!-- [property] is one-way (component -> DOM); [(ngModel)] is two-way (DOM <-> component) -->
