server:
  port: 9090

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    gateway:
      # Response caching for GET requests - avoids re-hitting downstream services
      # for identical requests within the cache TTL (Spring Cloud Gateway 4.1+).
      filter:
        local-response-cache:
          enabled: true
          time-to-live: 30s
          size: 50MB
      routes:
        - id: customer-service-route
          uri: lb://CUSTOMER-SERVICE
          predicates:
            - Path=/customers/**
          filters:
            # Path rewriting: /customers/** -> /api/customers/** on the downstream service
            - RewritePath=/customers/(?<segment>.*), /api/customers/${segment}
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"
            - LocalResponseCache

        - id: billing-service-route
          uri: lb://BILLING-SERVICE
          predicates:
            - Path=/billing/**
          filters:
            - RewritePath=/billing/(?<segment>.*), /api/bills/${segment}
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"
            - LocalResponseCache

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.cognizant.apigateway: INFO
