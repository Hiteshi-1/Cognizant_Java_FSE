server:
  port: 8082

spring:
  application:
    name: order-service

  # ---- Use MySQL in real deployment (uncomment & configure) ----
  # datasource:
  #   url: jdbc:mysql://localhost:3306/order_service_db?createDatabaseIfNotExist=true
  #   username: root
  #   password: root
  # jpa:
  #   hibernate:
  #     ddl-auto: update

  # ---- H2 in-memory DB used for quick local demo/testing ----
  datasource:
    url: jdbc:h2:mem:orderdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

# Base URL of user-service - order-service calls this via WebClient
user-service:
  base-url: http://localhost:8081

management:
  endpoints:
    web:
      exposure:
        include: health,info
